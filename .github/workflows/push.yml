name: Release & Docker Push

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      tag:
        description: "Docker image tag to push"
        required: false
        default: "latest"

jobs:
  format-check:
    name: Prettier Format Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run format:check

  release:
    name: Semantic Release
    if: github.event_name == 'push'
    needs: format-check
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write
      pull-requests: write
    outputs:
      new-release: ${{ steps.semantic.outputs.new_release_published }}
      version: ${{ steps.semantic.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v6
      - id: semantic
        uses: cycjimmy/semantic-release-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-push:
    name: Docker Push
    needs: release
    if: needs.release.outputs.new-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: app
          push: true
          build-args: |
            BUILD_VERSION=${{ needs.release.outputs.version }}
          tags: |
            ${{ vars.DOCKER_IMAGE }}:latest
            ${{ vars.DOCKER_IMAGE }}:${{ needs.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-force-push:
    name: Docker Force Push
    needs: format-check
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: app
          push: true
          build-args: |
            BUILD_VERSION=${{ inputs.tag }}
          tags: ${{ vars.DOCKER_IMAGE }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-push-migrate:
    name: Docker Push (Migrate)
    needs: release
    if: needs.release.outputs.new-release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: migrate
          push: true
          tags: |
            ${{ vars.DOCKER_MIGRATE_IMAGE }}:latest
            ${{ vars.DOCKER_MIGRATE_IMAGE }}:${{ needs.release.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  docker-force-push-migrate:
    name: Docker Force Push (Migrate)
    needs: format-check
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: migrate
          push: true
          tags: ${{ vars.DOCKER_MIGRATE_IMAGE }}:${{ inputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-vps:
    name: Deploy to VPS
    needs:
      [
        docker-push,
        docker-force-push,
        docker-push-migrate,
        docker-force-push-migrate,
      ]
    if: always() && (needs.docker-push.result == 'success' || needs.docker-force-push.result == 'success')
    concurrency:
      group: deploy-vps
      cancel-in-progress: false
    environment: deployment
    runs-on: ubuntu-latest
    steps:
      - name: Make .ssh folder
        run: mkdir -p ~/.ssh
      - name: Write SSH private key
        run: echo '${{ secrets.GILGAMESH_SSH_PRIVATE_KEY }}' > ~/.ssh/id_rsa
      - name: Set permissions for SSH private key
        run: chmod 400 ~/.ssh/id_rsa
      - name: SSH into server
        run: ssh -o StrictHostKeyChecking=no -i ~/.ssh/id_rsa ${{ secrets.GILGAMESH_SSH_USER }}@${{ secrets.GILGAMESH_SSH_HOST }} ${{ vars.SSH_COMMAND }}
